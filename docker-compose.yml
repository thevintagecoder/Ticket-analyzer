services:
  db:
    image: postgres:16-alpine
    container_name: ticket-analyzer-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket_analyser

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_analyser"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
